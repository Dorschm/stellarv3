<!doctype html>
<html lang="en" class="h-full preload" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title data-i18n="main.title">Stellar.Game (ALPHA)</title>
    <link rel="manifest" href="<%- manifestHref %>" />
    <link rel="icon" type="image/svg+xml" href="<%- faviconHref %>" />

    <!-- Preload styles -->
    <style>
      .preload {
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.5s ease-out;
      }

      /* iOS safe area support */
      body {
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
      }

      /* Ensure full viewport height on iOS */
      html,
      body {
        height: 100%;
        height: -webkit-fill-available;
        min-height: 100%;
        min-height: -webkit-fill-available;
      }

      /* 3D space background for the shell/lobby. Pure CSS — no image
         assets, so it scales cleanly at any resolution. Layers:
          1. Deep-space radial gradient (dark navy → black)
          2. Two nebula glows (purple, cyan) — blurred, blended
          3. Two starfield layers tiled via radial-gradients, offset for
             parallax feel; animated with a slow drift. */
      #space-bg {
        background: radial-gradient(
          ellipse at 50% 35%,
          #0d1b3e 0%,
          #050a18 55%,
          #000000 100%
        );
      }
      #space-bg .nebula {
        position: absolute;
        border-radius: 9999px;
        filter: blur(110px);
        mix-blend-mode: screen;
        pointer-events: none;
      }
      #space-bg .nebula-purple {
        top: 10%;
        left: 20%;
        width: 42vw;
        height: 42vw;
        max-width: 800px;
        max-height: 800px;
        background: radial-gradient(
          circle,
          rgba(109, 40, 217, 0.45) 0%,
          rgba(109, 40, 217, 0) 70%
        );
      }
      #space-bg .nebula-cyan {
        bottom: 5%;
        right: 10%;
        width: 38vw;
        height: 38vw;
        max-width: 700px;
        max-height: 700px;
        background: radial-gradient(
          circle,
          rgba(14, 165, 233, 0.35) 0%,
          rgba(14, 165, 233, 0) 70%
        );
      }
      #space-bg .nebula-magenta {
        top: 55%;
        left: 8%;
        width: 30vw;
        height: 30vw;
        max-width: 500px;
        max-height: 500px;
        background: radial-gradient(
          circle,
          rgba(236, 72, 153, 0.22) 0%,
          rgba(236, 72, 153, 0) 70%
        );
      }
      #space-bg .stars {
        position: absolute;
        inset: 0;
        background-repeat: repeat;
        pointer-events: none;
      }
      #space-bg .stars-far {
        background-image:
          radial-gradient(1px 1px at 12% 18%, #ffffff 50%, transparent 100%),
          radial-gradient(1px 1px at 27% 62%, #dbeafe 50%, transparent 100%),
          radial-gradient(1px 1px at 43% 9%, #ffffff 50%, transparent 100%),
          radial-gradient(1px 1px at 58% 34%, #e0f2fe 50%, transparent 100%),
          radial-gradient(1px 1px at 71% 78%, #ffffff 50%, transparent 100%),
          radial-gradient(1px 1px at 84% 22%, #f5f3ff 50%, transparent 100%),
          radial-gradient(1px 1px at 94% 55%, #ffffff 50%, transparent 100%),
          radial-gradient(1px 1px at 8% 85%, #ddd6fe 50%, transparent 100%),
          radial-gradient(1px 1px at 36% 88%, #ffffff 50%, transparent 100%),
          radial-gradient(1px 1px at 63% 7%, #ffffff 50%, transparent 100%);
        background-size: 320px 320px;
        opacity: 0.7;
        animation: space-drift 180s linear infinite;
      }
      #space-bg .stars-mid {
        background-image:
          radial-gradient(
            1.5px 1.5px at 18% 42%,
            #ffffff 50%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 49% 73%,
            #c7d2fe 50%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 77% 12%,
            #ffffff 50%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 31% 21%,
            #a5f3fc 50%,
            transparent 100%
          ),
          radial-gradient(
            1.5px 1.5px at 88% 68%,
            #ffffff 50%,
            transparent 100%
          ),
          radial-gradient(1.5px 1.5px at 6% 55%, #fef3c7 50%, transparent 100%);
        background-size: 520px 520px;
        opacity: 0.85;
        animation: space-drift 120s linear infinite reverse;
      }
      #space-bg .stars-near {
        background-image:
          radial-gradient(2px 2px at 22% 30%, #ffffff 50%, transparent 100%),
          radial-gradient(2px 2px at 66% 50%, #ffffff 50%, transparent 100%),
          radial-gradient(
            2.5px 2.5px at 45% 82%,
            #fef9c3 50%,
            transparent 100%
          ),
          radial-gradient(2px 2px at 82% 18%, #ffffff 50%, transparent 100%);
        background-size: 780px 780px;
        opacity: 1;
        animation: space-drift 90s linear infinite;
      }
      @keyframes space-drift {
        from {
          background-position: 0 0;
        }
        to {
          background-position: 320px 640px;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #space-bg .stars-far,
        #space-bg .stars-mid,
        #space-bg .stars-near {
          animation: none;
        }
      }
    </style>

    <!-- SEO -->
    <link rel="canonical" href="https://stellar.game/" />
    <meta
      name="description"
      content="Conquer the galaxy in this multiplayer space battle royale! Expand your territory, eliminate opponents, and dominate the star map in this fast-paced strategy game."
    />

    <!-- Open Graph -->
    <meta property="og:url" content="https://stellar.game/" />
    <meta property="og:title" content="Stellar.Game - Battle Royale" />
    <meta
      property="og:description"
      content="Conquer the galaxy in this multiplayer space battle royale! Expand your territory, eliminate opponents, and dominate the star map in this fast-paced strategy game."
    />
    <meta property="og:image" content="<%- gameplayScreenshotUrl %>" />
    <meta property="og:type" content="game" />

    <!-- Injected from Server env -->
    <script>
      window.GIT_COMMIT = <%- gitCommit %>;
      window.ASSET_MANIFEST = <%- assetManifest %>;
      window.BOOTSTRAP_CONFIG = {
        gameEnv: <%- gameEnv %>,
      };
    </script>

    <!-- Cloudflare Turnstile -->
    <script
      src="https://challenges.cloudflare.com/turnstile/v0/api.js"
      async
      defer
    ></script>

    <!-- Analytics -->
  </head>

  <body
    class="h-full select-none font-sans min-h-screen bg-neutral-800 transition-opacity duration-300 ease-in-out flex flex-row overflow-hidden"
  >
    <div
      id="space-bg"
      class="fixed inset-0 -z-50 pointer-events-none overflow-hidden"
    >
      <div class="nebula nebula-purple"></div>
      <div class="nebula nebula-cyan"></div>
      <div class="nebula nebula-magenta"></div>
      <div class="stars stars-far"></div>
      <div class="stars stars-mid"></div>
      <div class="stars stars-near"></div>
    </div>

    <!-- React shell mount point -->
    <div id="shell-root" class="contents"></div>

    <!-- React/R3F root — primary in-game rendering + HUD -->
    <div id="react-root"></div>

    <!-- Scripts -->
    <script>
      // Remove preload class after everything is loaded
      window.addEventListener("load", function () {
        requestAnimationFrame(() => {
          document.documentElement.classList.remove("preload");
        });
      });

      // Fallback: remove preload class after timeout in case DOMContentLoaded never fires
      setTimeout(function () {
        document.documentElement.classList.remove("preload");
      }, 3000);
    </script>

    <!-- Analytics -->
    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js"
      data-cf-beacon='{"token": "03d93e6fefb349c28ee69b408fa25a13"}'
    ></script>

    <!-- React shell entry point -->
    <script type="module" src="/src/client/shell/index.tsx"></script>
  </body>
</html>
